把右邊這串字拖曳到書籤列即可使用：<a href='javascript:(async function(){try{const t=await navigator.clipboard.readText();if(!t)return;let u;try{u=new URL(t.trim())}catch(e){return}const h=u.hostname;if(h.includes("facebook.com")&&u.pathname==="/l.php"){const r=u.searchParams.get("u");if(r)u=new URL(decodeURIComponent(r))}else if(h==="www.google.com"&&u.pathname==="/url"){const r=u.searchParams.get("q")||u.searchParams.get("url");if(r)u=new URL(decodeURIComponent(r))}const p=["fbclid","gclid","igshid","ttclid","twclid","utm_source","utm_medium","utm_campaign","utm_term","utm_content","si"];p.forEach(x=>u.searchParams.delete(x));let c=u.toString();try{c=decodeURIComponent(c)}catch(e){}if(t!==c){await navigator.clipboard.writeText(c);}}catch(err){console.error(err)}})();'>去識別</a>
